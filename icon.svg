    <circle cx="26" cy="-6" r="9" fill="#5a3a00"/>
    <circle cx="-23" cy="-9" r="3" fill="#fff"/>
    <circle cx="29" cy="-9" r="3" fill="#fff"/>
    <path d="M-22 18 Q0 40 22 18" fill="none" stroke="#5a3a00" stroke-width="7" stroke-linecap="round"/>
    <circle cx="-44" cy="14" r="9" fill="#ff9bb0" opacity=".7"/>
    <circle cx="44" cy="14" r="9" fill="#ff9bb0" opacity=".7"/>
